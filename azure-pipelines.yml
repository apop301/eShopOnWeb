# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# ================================
# 1️⃣ BUILD STAGE
# ================================
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    displayName: "Build and Publish App"
    steps:

    - task: UseDotNet@2
      displayName: "Install .NET 8 SDK"
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: "Restore"
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: "Build"
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration)'

    # Publish DOAR proiectul Web, FĂRĂ zip
    - task: DotNetCoreCLI@2
      displayName: "Publish Web App"
      inputs:
        command: 'publish'
        projects: 'src/Web/Web.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    # Creăm noi ZIP-ul ca să fie EXACT 1 fișier
    - script: |
        cd $(Build.ArtifactStagingDirectory)
        zip -r eShopOnWeb.zip .
      displayName: "Create single ZIP"

    - task: PublishBuildArtifacts@1
      displayName: "Publish Artifact"
      inputs:
        pathtoPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'


# ================================
# 2️⃣ DEPLOY STAGE
# ================================
- stage: Deploy
  displayName: "Deploy Stage"
  dependsOn: Build

  jobs:
  - deployment: DeployWeb
    displayName: "Deploy to Azure WebApp"
    environment: "eShopOnWeb-dev"

    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadBuildArtifacts@1
            displayName: "Download Build Artifact"
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: AzureWebApp@1
            displayName: "Deploy to WebApp"
            inputs:
              azureSubscription: "eshop-connection"   # ← numele service connection-ului tău
              appType: "webAppLinux"
              appName: "eShopOnWeb"
              package: "$(System.ArtifactsDirectory)/drop/eShopOnWeb.zip"