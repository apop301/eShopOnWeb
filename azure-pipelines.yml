# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# ================================
# 1️⃣ BUILD STAGE
# ================================
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    displayName: "Build and Publish App"
    steps:

    - task: UseDotNet@2
      displayName: "Install .NET 8 SDK"
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: "Restore"
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: "Build"
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration)'

    # Publish DOAR Web App (fără multe zip-uri)
    - task: DotNetCoreCLI@2
      displayName: "Publish Web App"
      inputs:
        command: 'publish'
        projects: 'src/Web/Web.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    # Creăm 1 singur ZIP
    - script: |
        cd $(Build.ArtifactStagingDirectory)
        zip -r eShopOnWeb.zip .
      displayName: "Create single ZIP"

    - task: PublishBuildArtifacts@1
      displayName: "Publish Artifact"
      inputs:
        pathtoPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'


# ================================
# 2️⃣ TEST DEPLOYMENT STAGE
# ================================
- stage: Test
  displayName: "Deploy to Test Environment"
  dependsOn: Build

  jobs:
  - deployment: DeployTest
    displayName: "Deploy to Test WebApp"
    environment: "eShop-Test"     # Environment TEST

    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadBuildArtifacts@1
            displayName: "Download Artifact"
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: AzureWebApp@1
            displayName: "Deploy to Test AppService"
            inputs:
              azureSubscription: "eshop-connection"   # ← numele SERVICE CONNECTION
              appType: "webAppLinux"
              appName: "eShopOnWeb-Test"      # ← NUMELE APP SERVICE TEST
              package: "$(System.ArtifactsDirectory)/drop/eShopOnWeb.zip"


# ================================
# 3️⃣ PRODUCTION DEPLOYMENT STAGE
# ================================
- stage: Production
  displayName: "Deploy to Production Environment"
  dependsOn: Test

  jobs:
  - deployment: DeployProd
    displayName: "Deploy to Production WebApp"
    environment: "eShop-Prod"     # Environment PROD

    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadBuildArtifacts@1
            displayName: "Download Artifact"
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: AzureWebApp@1
            displayName: "Deploy to Production AppService"
            inputs:
              azureSubscription: "eshop-connection"   # ← numele SERVICE CONNECTION
              appType: "webAppLinux"
              appName: "eShopOnWeb"          # ← NUMELE APP SERVICE PROD
              package: "$(System.ArtifactsDirectory)/drop/eShopOnWeb.zip"